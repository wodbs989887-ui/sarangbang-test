<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>시험분노 해방구</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 20% 20%,#49351d,transparent 30%),radial-gradient(circle at 80% 20%,#143044,transparent 30%),linear-gradient(135deg,#10151d,#21161a);color:#f7f4ea;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(#ffffff12 1px,transparent 1px),linear-gradient(90deg,#ffffff12 1px,transparent 1px);background-size:48px 48px;opacity:.35}.app{position:relative;height:100dvh;display:grid;grid-template-rows:auto 1fr auto;gap:12px;padding:clamp(12px,2vw,24px)}header{display:flex;justify-content:space-between;align-items:center;gap:12px;z-index:2}h1{margin:0;font-size:clamp(30px,5vw,64px);line-height:.9}.sub{margin:6px 0 0;color:#b8bdc7}.score{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill{padding:8px 12px;border:1px solid #ffffff2a;border-radius:10px;background:#121820cc;box-shadow:0 12px 30px #0008}.pill b{color:#ffd166;margin-left:6px}canvas{width:100%;height:100%;border:1px solid #ffffff2a;border-radius:12px;background:linear-gradient(#ffffff10,transparent),#0b0f16aa;box-shadow:0 30px 80px #0008;touch-action:manipulation}footer{z-index:2;display:flex;gap:12px;align-items:center;justify-content:center}.key{min-width:min(340px,60vw);height:46px;border:1px solid #fff8;border-bottom-width:5px;border-radius:10px;background:linear-gradient(#fff8e5,#cfd6df);color:#141820;font-weight:900;letter-spacing:.1em}.key:active,.key.on{transform:translateY(3px);border-bottom-width:1px}.msg{font-weight:800;text-shadow:0 2px 12px #000}@media(max-width:760px){header,footer{flex-direction:column;align-items:flex-start}.score{justify-content:flex-start}}</style></head><body><main class="app"><header><div><h1>시험분노 해방구</h1><p class="sub">진짜 기계 말고, 이 픽셀 노트북만 책임지고 박살냅니다.</p></div><div class="score"><div class="pill">타격 <b id="hits">0</b></div><div class="pill">분노해소 <b id="rage">0%</b></div><div class="pill">상태 <b id="state">멀쩡함</b></div></div></header><canvas id="c"></canvas><footer><button class="key" id="btn">SPACE</button><p class="msg" id="msg">오늘 공부 진짜 빡세도, 한 문제씩 찢으면 됩니다. 화이팅.</p></footer></main><script>const c=document.getElementById('c'),x=c.getContext('2d'),btn=document.getElementById('btn'),hit=document.getElementById('hits'),rage=document.getElementById('rage'),state=document.getElementById('state'),msg=document.getElementById('msg');let W,H,dpr=Math.min(devicePixelRatio||1,2),n=0,shake=0,bits=[],cracks=[],words=[];const states=['멀쩡함','금 시작','키캡 탈주','힌지 절단','본체 붕괴','형체 상실','완전 분쇄','해방'],msgs=['스페이스 누르는 순간부터 조집니다.','액정이 현실을 거부하기 시작했습니다.','키캡 탈주. 오답노트보다 먼저 튑니다.','힌지가 비명 지르는 중.','본체가 무너지고 있습니다.','전자기기보다 금속 샐러드에 가깝습니다.','형체 실종. 시험분노 격리 성공.','가루 완료. 물 마시고 다시 한 문제만 갑시다.'];function R(a,b){return a+Math.random()*(b-a)}function resize(){let r=c.getBoundingClientRect();W=c.width=r.width*dpr;H=c.height=r.height*dpr;x.setTransform(dpr,0,0,dpr,0,0);W=r.width;H=r.height}function m(){let sw=Math.min(W*.72,H*.9,880),sh=sw*.58,bw=sw*1.25,bh=sw*.2,sx=W/2-sw/2,sy=Math.max(25,(H-sh-bh-20)*.48);return{sw,sh,bw,bh,sx,sy,bx:W/2-bw/2,by:sy+sh+20}}function rr(a,b,w,h,r){x.beginPath();x.roundRect?x.roundRect(a,b,w,h,r):(x.rect(a,b,w,h));}function boom(){n++;shake=Math.min(45,10+n);let q=m(),px=R(q.sx+q.sw*.25,q.sx+q.sw*.75),py=R(q.sy+q.sh*.2,q.sy+q.sh*.75);for(let i=0;i<25+n*2;i++){let a=R(-Math.PI,Math.PI),s=R(100,580);bits.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s-R(60,220),r:R(3,12),life:R(.7,1.8),c:['#ff4d5a','#ffd166','#61dafb','#8d99a8','#293241'][i%5]})}for(let b=0;b<5;b++){let pts=[],cx=px,cy=py,ang=R(-3,3);for(let i=0;i<6;i++){pts.push([cx,cy]);cx+=Math.cos(ang)*R(15,50);cy+=Math.sin(ang)*R(15,50);ang+=R(-.7,.7)}cracks.push(pts)}words.push({t:['쾅!','빠각!','콰직!','와장창!'][n%4],x:px,y:py,life:.8});hit.textContent=n;rage.textContent=Math.min(100,Math.floor(n*2))+'%';let s=Math.min(7,Math.floor(n/7));state.textContent=states[s];msg.textContent=msgs[s];btn.classList.add('on');setTimeout(()=>btn.classList.remove('on'),120);try{let A=window.AudioContext||window.webkitAudioContext,a=boom.a||(boom.a=new A),o=a.createOscillator(),g=a.createGain();if(a.state==='suspended')a.resume();o.type='triangle';o.frequency.setValueAtTime(120,a.currentTime);o.frequency.exponentialRampToValueAtTime(35,a.currentTime+.18);g.gain.setValueAtTime(.35,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.2);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.22)}catch(e){}}function draw(t){x.clearRect(0,0,W,H);x.save();if(shake>1){x.translate(R(-shake,shake),R(-shake,shake));shake*=.86}let q=m(),s=Math.min(1,n/50);x.fillStyle='#ffffff0b';x.fillRect(0,0,W,H);if(n>=50){x.fillStyle='#05070b';x.beginPath();x.ellipse(W/2,q.by+q.bh*.6,q.bw*.48,q.sh*.22,0,0,7);x.fill();for(let i=0;i<120;i++){x.save();x.translate(W/2+R(-q.bw*.45,q.bw*.45),q.by+R(-q.sh*.25,q.sh*.25));x.rotate(R(-2,2));x.fillStyle=['#26313e','#8793a3','#ff4d5a','#ffd166'][i%4];x.fillRect(-R(4,18),-R(3,10),R(12,45),R(5,20));x.restore()}x.fillStyle='#f7f4ea';x.font='900 36px system-ui';x.textAlign='center';x.fillText('노트북이었던 것',W/2,q.by-q.sh*.35)}else{x.save();x.translate(q.sx+q.sw/2,q.sy+q.sh);x.rotate(-s*.5);x.scale(1+s*.15,1-s*.35);x.translate(-(q.sx+q.sw/2),-(q.sy+q.sh));rr(q.sx,q.sy,q.sw,q.sh,16);x.fillStyle=n>25?'#11151c':'#1d2430';x.fill();x.lineWidth=7;x.strokeStyle=n>25?'#ff4d5a':'#394657';x.stroke();rr(q.sx+18,q.sy+18,q.sw-36,q.sh-38,8);x.fillStyle=n>16?'#211018':'#13233f';x.fill();x.restore();x.save();x.translate(0,s*40);x.beginPath();x.moveTo(q.bx+35-s*45,q.by+s*20);x.lineTo(q.bx+q.bw-35+s*35,q.by-s*10);x.lineTo(q.bx+q.bw-s*55,q.by+q.bh+s*22);x.lineTo(q.bx+s*50,q.by+q.bh-s*10);x.closePath();x.fillStyle=n>25?'#6d3038':'#5f6c7b';x.fill();x.strokeStyle='#aab3bf';x.stroke();for(let r=0;r<3;r++)for(let c2=0;c2<12;c2++){if(n>4&&(r+c2+n)%Math.max(2,8-Math.floor(n/8))===0)continue;x.fillStyle='#1d2430';x.fillRect(q.bx+q.bw*.12+c2*q.bw*.06,q.by+q.bh*.18+r*q.bh*.18,q.bw*.045,q.bh*.11)}x.restore();x.save();rr(q.sx+18,q.sy+18,q.sw-36,q.sh-38,8);x.clip();x.lineCap='round';for(const pts of cracks){x.strokeStyle='#ffffffdd';x.lineWidth=2;x.beginPath();pts.forEach((p,i)=>i?x.lineTo(p[0],p[1]):x.moveTo(p[0],p[1]));x.stroke();x.strokeStyle='#61dafb66';x.lineWidth=5;x.stroke()}x.restore()}for(let i=bits.length-1;i>=0;i--){let p=bits[i];p.life-=.016;p.vy+=13;p.x+=p.vx*.016;p.y+=p.vy*.016;if(p.life<=0||p.y>H+80){bits.splice(i,1);continue}x.globalAlpha=Math.max(0,p.life);x.fillStyle=p.c;x.fillRect(p.x,p.y,p.r*1.5,p.r)}x.globalAlpha=1;for(let i=words.length-1;i>=0;i--){let w=words[i];w.life-=.016;w.y-=2;if(w.life<=0){words.splice(i,1);continue}x.font='900 44px system-ui';x.textAlign='center';x.lineWidth=8;x.strokeStyle='#0009';x.strokeText(w.t,w.x,w.y);x.fillStyle='#ffd166';x.fillText(w.t,w.x,w.y)}x.restore();requestAnimationFrame(draw)}addEventListener('resize',resize);addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();boom()}});btn.onclick=boom;c.onpointerdown=boom;resize();draw();</script></body></html>
